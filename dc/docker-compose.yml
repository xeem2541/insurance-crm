version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: insurance_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: insurance_db
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build:
      context: ./backend
    container_name: insurance_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_USER=app_user
      - DB_PASSWORD=app_password
      - DB_NAME=insurance_db
      - PORT=5000
      - JWT_SECRET=super_secret_key_123
      - LINE_CHANNEL_SECRET=daed00151622c71dad0449233dfacd60
      - LINE_CHANNEL_ACCESS_TOKEN=Dl3W/OhoWGdOxH2rIfNebRsYOZfSza4PPdCPW28vHALJtMKAunw2FJnJXLwEMPjbQdc4LfoyNATjBowiU/xU1DahOj3rca00PLzihjjBKJesCW54D2CKJnR12y7YFtJTw73RgY6LvMVpG8Bbfx84xgdB04t89/1O/w1cDnyilFU=
      - GEMINI_API_KEY=AIzaSyDQ6RGL7UpuzsA--6_LjvBiql2nCFRYVq0
    volumes:
      - ./backend:/app
      - /app/node_modules
      - uploads_data:/app/uploads
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    container_name: insurance_frontend
    restart: always
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  db_data:
  uploads_data:
